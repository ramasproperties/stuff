<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rama's Properties - Stuff</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Mono',monospace;background:#F7F2EA;color:#2A1F0E}

    .header{padding:2.5rem 3rem;border-bottom:1px solid #C9B99A;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .brand-name{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;letter-spacing:-1px;color:#2A1F0E;line-height:1}
    .brand-sub{font-size:10px;letter-spacing:4px;color:#8A7A62;text-transform:uppercase;margin-top:5px}
    .ig-link{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1.5px;color:#5C4A2A;text-decoration:none;border:1px solid #C9B99A;padding:10px 18px;background:#EDE5D4;text-transform:uppercase}
    .ig-link:hover{background:#DDD0BA}

    .divider{display:flex;align-items:center;gap:16px;padding:0 3rem;margin:2rem 0}
    .divider-line{flex:1;height:1px;background:#C9B99A}
    .divider-text{font-size:9px;letter-spacing:5px;color:#8A7A62;text-transform:uppercase;white-space:nowrap}

    .search-wrap{padding:0 3rem;margin-bottom:2rem;display:flex;justify-content:center}
    .search-box{position:relative;width:100%;max-width:420px}
    .search-box input{
      width:100%;
      font-family:'DM Mono',monospace;
      font-size:12px;
      letter-spacing:1px;
      color:#2A1F0E;
      background:#EDE5D4;
      border:1px solid #C9B99A;
      padding:12px 16px 12px 38px;
      outline:none;
    }
    .search-box input::placeholder{color:#A9966F}
    .search-box input:focus{border-color:#8A7A62}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8A7A62;pointer-events:none}
    .no-results{display:none;text-align:center;font-size:12px;letter-spacing:1px;color:#8A7A62;padding:2rem 1rem;text-transform:uppercase}

    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid #C9B99A;border-left:1px solid #C9B99A;margin:0 3rem 3rem}

    .card{border-right:1px solid #C9B99A;border-bottom:1px solid #C9B99A;background:#F7F2EA}

    .thumb{width:100%;aspect-ratio:1;background:#EDE5D4;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #C9B99A;position:relative;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{padding:1.5rem}
    .item-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;line-height:1.45;margin-bottom:8px;color:#2A1F0E}
    .item-price{font-size:12px;letter-spacing:1px;color:#5C4A2A;margin-bottom:14px}

    .desc-btn{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:#8A7A62;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
    .desc-btn:hover{color:#5C4A2A}
    .desc-btn::before{content:'';display:inline-block;width:12px;height:1px;background:currentColor}

    .desc-box{font-size:12px;line-height:1.8;color:#5C4A2A;margin-bottom:16px;padding:12px 14px;background:#EDE5D4;border-left:2px solid #C9B99A;display:none}
    .desc-box.open{display:block}
    .close-btn{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:#8A7A62;padding:0;margin-top:10px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
    .close-btn:hover{color:#5C4A2A}
    .close-btn::before{content:'';display:inline-block;width:12px;height:1px;background:currentColor}

    .dm-btn{display:block;text-align:center;text-decoration:none;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;padding:12px;border:1px solid #2A1F0E;color:#2A1F0E;background:transparent}
    .dm-btn:hover{background:#2A1F0E;color:#F7F2EA}
    .footer{padding:1.5rem 3rem;border-top:1px solid #C9B99A;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .footer-left{font-size:9px;letter-spacing:3px;color:#8A7A62;text-transform:uppercase}
    .footer-right{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#8A7A62}

    @media(max-width:768px){
      .header{padding:1.2rem 1rem}
      .brand-name{font-size:1.8rem}
      .divider{padding:0 1rem;margin:1.2rem 0}
      .search-wrap{padding:0 1rem}
      .grid{grid-template-columns:1fr;margin:0 1rem 2rem}
      .thumb{aspect-ratio:4/3}
      .card-body{padding:1.2rem}
      .footer{padding:1rem}
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="brand-name">Rama's Properties</div>
    <div class="brand-sub">Stuff</div>
  </div>
  <a class="ig-link" href="https://www.instagram.com/ramasproperties" target="_blank">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    @ramasproperties — DM untuk beli
  </a>
</div>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text">Katalog</div>
  <div class="divider-line"></div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Cari nama produk..." oninput="cariProduk()">
  </div>
</div>

<div class="grid" id="productGrid"></div>
<div class="no-results" id="noResults">— Produk tidak ditemukan —</div>

<div class="footer">
  <div class="footer-left">Indonesia</div>
  <div class="footer-right">Vintage</div>
</div>

<script>
const products = [
  {img:'keranjang.jpg', name:'Keranjang Chiller Freezer Kulkas Box Semua Ukuran', price:'Rp 50.000', desc:'Keranjang chiller/freezer/kulkas.<br><br>Kondisi bekas layak pakai.<br><br>Banyak variasi ukuran dan model keranjang lain, silahkan tanya ke admin (saya).<br><br>Gratis antar di provinsi Yogyakarta minimal beli 2.<br><br>Jika hanya beli 1 ongkos Rp25.000.', link:'https://www.facebook.com/share/19jbWpauSH/'},
  {img:'vacuum.jpg', name:'Vacuum Kasur Anti Tungau Umeda Waku UV-C 12kPa - Mulus & Lengkap', price:'Rp 550.000', desc:'Dijual Umeda Wa-Ku UV-C Dust Mite Vacuum (Pearl White) seharga Rp550.000 dengan kondisi mulus, sangat terawat, dan fullset lengkap (box original, filter cadangan, kuas pembersih, buku panduan, dan kartu garansi). Alat ini sangat efektif membersihkan kasur berkat daya hisap kuat 12 kPa, lampu sterilisasi UV-C 99.9%, sistem getar penepuk 8000 beats/min, dan HEPA filter, namun tetap hemat daya (300 Watt), ringan (1.2 kg), serta fleksibel dengan kabel sepanjang 5 meter. Stok terbatas hanya 1 unit, siapa cepat dia dapat!', link:'https://www.facebook.com/share/1QuRZpeKzk/'},
  {img:'kursi.jpg', name:'Kursi Besi Lawasan Asli Bantul (Grubug) - Vintage Gaya Industrial', price:'Rp 100.000', desc:'Dijual kursi besi pipa jadul langka dengan marking original "GRUBUG" khas Yogyakarta—pilihan tepat untuk koleksi maupun investasi dengan nilai jual yang pasti terus naik. Kursi ini sangat cocok untuk properti foto, dekorasi kafe gaya industrial, atau kursi teras unik, berkat kondisi fisiknya yang masih kokoh (tanpa keropos parah) serta perpaduan cat hijau ori dan patina karat alami yang memberikan kesan rustic antik. Tersedia stok 50+ unit, siapa cepat dia dapat! Siap dipantau langsung dan diangkut di lokasi.', link:'https://www.facebook.com/share/1Ch7dmvKY8/'},
  {img:'meja.jpg', name:'Meja Besi Vintage "GRUBUG" Gaya Industrial - Meja Paling Langka', price:'Rp 250.000', desc:'Dijual meja besi vintage "GRUBUG" gaya industrial yang langka dan bernilai investasi tinggi—solusi instan untuk menghadirkan vibe kafe kekinian di rumah, studio, atau taman Anda. Meja berbahan rangka besi kokoh model pipa lengkung ini dilengkapi grafir asli "GRUBUG" di permukaannya, sangat serbaguna untuk dudukan tanaman (plant stand), dekorasi rustic, maupun proyek DIY. Tersedia dalam dua pilihan ukuran: besar (Rp275K) dan kecil (Rp250K). Stok terbatas, siapa cepat dia dapat! Silakan cek barang sepuasnya secara COD / ambil langsung di lokasi.', link:'https://www.facebook.com/share/1C9irBWjUE/'},
  {img:'kwm.jpg', name:'Langka: Karakter Wanita Muslim - DR. Sayyid Muhammad Namir 1992', price:'Rp 1.000.000', desc:'Buku ini adalah panduan lengkap untuk membentuk wanita menjadi sosok Muslimah terbaik, yang sangat praktis untuk diterapkan langsung oleh wanita maupun dijadikan acuan bagi pria dalam mendidik pasangannya tanpa trial-and-error. Menawarkan informasi bernilai tinggi yang dijamin antirugi, buku ini bisa Anda dapatkan dengan harga investasi Rp1.000.000 (pas). Jika Anda tertarik, silakan langsung hubungi saya melalui DM. Wassalamu’alaikum Wr. Wb.', link:'https://www.facebook.com/share/1BbbkzKcKG/'},
  {img:'meriam.jpg', name:'Meriam Antik Langka dengan Roda - Statement Piece Kolektor Serius (Kondisi Otentik Bersejarah)', price:'Rp 11.000.000', desc:'Dijual meriam besi antik megah dengan roda logam utuh—sebuah masterpiece high-end sangat langka yang ditawarkan eksklusif untuk kolektor langsung (bukan untuk dijual kembali). Memiliki laras utuh yang bisa diteropong sepanjang 1.5–1.8 meter, barang ini mempertahankan cat merah marun ori dengan patina alami yang sarat sejarah, menjadikannya statement piece sempurna untuk lobi properti, taman luas, atau museum pribadi. Ditawarkan dengan harga Rp 11.000.000 (Harga Nett) bagi Anda yang memahami nilainya. Berlokasi di Sleman, DI Yogyakarta, pengiriman untuk barang besar dan berat ini akan diatur secara khusus. Jangan lewatkan kesempatan investasi sejarah langka ini!', link:'https://www.facebook.com/share/1BYAMfBUji/'}
];

function renderProducts(list){
  const grid = document.getElementById('productGrid');
  const noResults = document.getElementById('noResults');
  if(list.length === 0){
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = list.map(p => `
    <div class="card">
      <div class="thumb">
        <img src="${p.img}" alt="${p.name}">
      </div>
      <div class="card-body">
        <div class="item-name">${p.name}</div>
        <div class="item-price">${p.price}</div>
        <button class="desc-btn" onclick="toggle(this)">Lihat deskripsi</button>
        <div class="desc-box">${p.desc}<button class="close-btn" onclick="tutup(this)">Tutup deskripsi</button></div>
        <a class="dm-btn" href="${p.link}" target="_blank">Dokumentasi</a>
      </div>
    </div>
  `).join('');
}

function cariProduk(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = products.filter(p => p.name.toLowerCase().includes(q));
  renderProducts(filtered);
}

function toggle(btn){
  btn.nextElementSibling.classList.add('open');
  btn.style.display='none';
}
function tutup(btn){
  const box=btn.closest('.desc-box');
  box.classList.remove('open');
  box.previousElementSibling.style.display='';
}

renderProducts(products);
</script>

</body>
</html>
